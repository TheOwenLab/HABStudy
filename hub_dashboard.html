<style type="text/css">/* ==========================================================================
     QUALTRICS SKIN OVERRIDES (Prevents Results Button from being chopped off)
     ========================================================================== */
  .Skin .QuestionOuter,
  .Skin .QuestionBody,
  .Skin .QuestionText {
    overflow: visible !important;
  }

  .Skin .QuestionOuter {
    padding-top: 0px !important;
    padding-bottom: 0px !important;
    margin-top: 0px !important;
    margin-bottom: 0px !important;
  }

  .Skin .Separator {
    display: none !important;
  }

  /* ==========================================================================
     UPGRADED PREMIUM TOOLTIP FRAMEWORK
     ========================================================================== */
  #brain-tooltip {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    margin: 0 !important;
    padding: 14px 18px;

    /* True transparency with slate tone */
    background: rgba(20, 16, 28, 0.82) !important;

    /* FIXED: Separated with a semicolon to render across all modern browsers */
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important;

    color: #ffffff;
    border-radius: 10px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    z-index: 10000;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(143, 85, 224, 0.15);
    text-align: left;
    max-width: 280px;
    border-left: 4px solid #8F55E0 !important;
    will-change: transform;
    pointer-events: none !important;
    transition: opacity 0.1s ease !important;
    transition-property: opacity !important;
  }

  .tooltip-title,
  .tooltip-meta-row,
  .tooltip-desc {
    display: block !important;
    white-space: normal !important;
  }

  .tooltip-title {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 8px;
    color: #ffffff;
    letter-spacing: 0.3px;
  }

  /* Flexbox alignment row for the Status Pill + Duration */
  .tooltip-meta-row {
    display: flex !important;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  /* UI Status Pills */
  .status-pill {
    display: inline-block !important;
    padding: 1px 6px !important;
    font-size: 10px !important;
    line-height: 1.3 !important;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-radius: 4px;
  }
  .status-notstarted { background: rgba(255, 255, 255, 0.12); color: #d0d0d0; }
  .status-inprogress { background: rgba(241, 196, 15, 0.18); color: #f1c40f; }
  .status-complete   { background: rgba(46, 204, 113, 0.2); color: #2ecc71; }

  .tooltip-duration {
    font-size: 12px;
    color: #bfa3e8;
    font-weight: 500;
  }

  .tooltip-desc {
    font-size: 13px;
    color: #c9c7cd;
    line-height: 1.5;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    padding-top: 8px;
  }

  /* ==========================================================================
     HUB LAYOUT & GRAPHIC ARCHITECTURE
     ========================================================================== */
  .hub-container {
    max-width: 700px;
    margin: 20px auto;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;
  }

  .hub-title {
    color: #333;
    font-size: 24px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .hub-subtitle {
    color: #666;
    font-size: 15px;
    margin-bottom: 30px;
  }

  #brain-placeholder {
    width: 100%;
    margin: 0 auto;
    min-height: 400px;
  }

  /* CONSOLIDATED: SVG Internal Component Lines */
  .brain-piece path,
  .brain-piece polygon,
  .brain-piece circle {
    stroke: #ffffff;
    stroke-width: 1.5px;
    pointer-events: none !important; /* Disables path tracking to eliminate motion stutter */
  }

  /* Structural Parent Group Settings */
  .brain-piece {
    pointer-events: all !important;
    cursor: pointer !important;
  }

  /* ==========================================================================
     OPTIMIZED STATUS FILTERS & HIGH-PERFORMANCE HOVER LOGIC
     ========================================================================== */

  /* 1. NOT STARTED BASE STATE */
  .piece-notstarted {
      filter: grayscale(100%) brightness(1.2) !important;
      opacity: 0.35 !important;
      transition: filter 0.3s ease, opacity 0.3s ease;
  }

  /* 2. IN PROGRESS BASE STATE */
  .piece-progress {
      filter: grayscale(50%) brightness(1.3) !important;
      opacity: 0.5 !important;
      transition: filter 0.3s ease, opacity 0.3s ease;
  }

  /* 3. COMPLETE BASE STATE */
  .piece-complete {
      filter: grayscale(0%) brightness(1) !important;
      opacity: 1 !important;
      transition: filter 0.3s ease, opacity 0.3s ease;
  }

  /* 4. THE HOVER OVERRIDE (Explicitly targets states to guarantee breakthrough) */
  .piece-notstarted:hover,
  .piece-progress:hover,
  .piece-complete:hover,
  .brain-piece:hover {
      filter: grayscale(0%) brightness(1.25) !important; /* Strips gray, boosts brightness */
      opacity: 1 !important;
      transition: filter 0.15s ease, opacity 0.15s ease !important;
  }

  /* ==========================================================================
     MISCELLANEOUS SVG ELEMENT PARAMETERS
     ========================================================================== */

  /* SVG Label Text Parameters */
  .brain-label {
    fill: white;
    font-size: 14px;
    font-weight: 600;
    pointer-events: none; /* Let clicks pass straight through text down to the group */
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
  }

  /* Safe block for Illustrator background wrappers */
  #brain-placeholder svg > rect:first-child {
    pointer-events: none !important;
  }
</style>
<div class="brain-container">
<div class="hub-container">
<div id="brain-tooltip" style="opacity: 0; pointer-events: none;">&nbsp;</div>

<div id="brain-placeholder">
<p style="color:#999; padding-top:100px;">Loading dashboard...</p>
</div>
</div>
</div>
